# Telegraf Configuration - RasPi5 (192.168.0.18)
# Runs as Docker container, reads host metrics via mounted volumes

[global_tags]
  host = "raspi5"

[agent]
  interval = "30s"
  round_interval = true
  flush_interval = "10s"
  hostname = "raspi5"
  omit_hostname = false

# InfluxDB 1.x output - uses Docker container name resolution
[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "sensors"
  skip_database_creation = true

# CPU usage
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = false

# Memory usage
[[inputs.mem]]

# Disk usage - root partition
[[inputs.disk]]
  mount_points = ["/"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# Network I/O
[[inputs.net]]
  interfaces = ["eth0"]

# CPU temperature
[[inputs.temp]]
