# Telegraf System Metrics Collector
# Deployed on RasPi5 (192.168.0.18)
# Collects host metrics via mounted /proc, /sys, /etc

services:
  telegraf:
    image: telegraf:1.30-alpine
    container_name: telegraf
    restart: unless-stopped
    environment:
      - HOST_PROC=/hostfs/proc
      - HOST_SYS=/hostfs/sys
      - HOST_ETC=/hostfs/etc
    volumes:
      - ./telegraf-raspi5.conf:/etc/telegraf/telegraf.conf:ro
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - /etc:/hostfs/etc:ro

networks:
  default:
    name: powerwall-dashboard_default
    external: true
