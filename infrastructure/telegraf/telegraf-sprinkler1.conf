# Telegraf Configuration - Sprinkler1 (192.168.0.100)
# Native install - copy to /etc/telegraf/telegraf.conf

[global_tags]
  host = "sprinkler1"

[agent]
  interval = "30s"
  round_interval = true
  flush_interval = "10s"
  hostname = "sprinkler1"
  omit_hostname = false

# InfluxDB 1.x output - uses IP since native install
[[outputs.influxdb]]
  urls = ["http://192.168.0.18:8086"]
  database = "sensors"
  skip_database_creation = true

# CPU usage
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = false

# Memory usage
[[inputs.mem]]

# Disk usage - root partition
[[inputs.disk]]
  mount_points = ["/"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# Network I/O
[[inputs.net]]
  interfaces = ["eth0", "wlan0"]

# CPU temperature
[[inputs.temp]]
